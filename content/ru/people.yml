  title: Скоро
  description: Путешествие от степей Средней Азии до берегов Средиземноморья. Откройте для себя яркую мозаику тюркских народов — их кочевое наследие, древние корни, духовные традиции, художественные выражения и непреходящее наследие, связывающее их через континенты.