title: Миниатюры
description: От алых звёзд и полумесяцев Анатолии до небесно-голубых просторов Средней Азии — флаги тюркских этносов рассказывают историю древних корней, общей истории и многообразных культур. Эта страница — ваш путеводитель по богатой символике этих эмблем. Погрузитесь в значения цветов, смысл узоров и уникальные истории каждого народа и общины тюркского мира.
navigation: true
hero:
  title: Сокровища тюркских миниатюр
  description: Цифровое путешествие в сияющий мир средневекового исламского книжного искусства — художественное наследие тимуридского, османского, сефевидского и могольского дворов через шедевры книжной иллюстрации.
