wars:
  title: Войны, битвы и вооружённые конфликты
  features:
    - title: Битва при Таласе (751 г. н.э.)
      description: Аббасидский халифат (с карлуками) против династии Тан (Китай). Ключевое сражение в Центральной Азии, остановившее китайскую экспансию на восток и открывшее путь распространению ислама среди тюркских народов. Известна также переносом технологии изготовления бумаги из Китая в мусульманский мир.
      to: /docs/common/turkic-peoples
      img: /wars/Battle of Talas.png
    - title: Сельджукско-византийские войны (1048–1308)
      description: Сельджукская империя против Византийской империи. Решающая победа сельджуков при Манцикерте открыла Анатолию для тюркского заселения, что привело к её тюркизации и исламизации. Это основополагающее событие для создания современной Турции.
      to: /docs/common/turkic-peoples
      img: /wars/Seljuk-Byzantine Wars.png
    - title: Монгольские завоевания (1206–1368)
      description: Монгольская империя (включавшая многие тюркские племена) против различных государств Евразии. Хотя завоевания велись монголами, они включили и преобразовали обширные тюркские народы. Итогом стало создание тюрко-монгольских государств-преемников (Золотая Орда, Чагатайское ханство), ставших колыбелью последующих тюркских империй (Тимуридов, Османов, Узбеков).
      to: /docs/common/turkic-peoples
      img: /wars/Mongol Conquests.png
    - title: Osmanские войны экспансии (XIV–XVI вв.)
      description: Османская империя против Византийской империи, балканских государств, Сефевидской Персии, Мамлюкского султаната. Эти войны утвердили Османскую империю как мировую державу, уничтожили Византийскую империю и обеспечили османское господство на Балканах, в Анатолии и на Ближнем Востоке на несколько столетий.
      to: /docs/common/turkic-peoples
      img: /wars/Ottoman Wars of Expansion.png
    - title: Военные походы Тимура (1370–1405)
      description: Империя Тимуридов против Золотой Орды, Делийского султаната, Османской империи, Мамлюкского султаната. Под руководством тюрко-монгольского завоевателя Тимура (Тамерлана) жестокие походы от Центральной Индии до Анатолии ненадолго создали огромную империю. Хотя недолговечные, они преобразили политический ландшафт, ослабили Золотую Орду и вызвали культурный ренессанс в столицах.
      to: /docs/common/turkic-peoples
      img: /wars/Timur's Military Campaigns.png
    - title: Осman-Habsburgские войны (1526–1791)
      description: Османская империя против империи Габсбургов (Австрия/Испания) и союзников. Этот многовековой конфликт определил границу между исламом и христианством в Центральной Европе. Провал второй осады Вены (1683) ознаменовал начало длительного отступления Османской империи из Европы.
      to: /docs/common/turkic-peoples
      img: /wars/Ottoman-Habsburg Wars.png
    - title: Русско-казанские войны (1439–1552)
      description: Царство Русское против Казанского ханства. Взятие Казани Иваном Грозным положило конец последнему крупному государству-преемнику Золотой Орды на Волге. Это стало катастрофическим переломным моментом, приведшим к постепенному завоеванию и присоединению большинства других тюркских ханств региона.
      to: /docs/common/turkic-peoples
      img: /wars/Russo-Kazan Wars.png
    - title: Osmanско-сефевидские войны (1514–1639)
      description: Османская империя против Сефевидской империи (Персия). Религиозно-геополитическая борьба между суннитскими османами и шиитскими Сефевидами. Закрепила раздел западноазиатского мира по osmanско-персидской линии, установив устойчивую границу, оказавшую глубокое влияние на идентичность современных Турции, Ирана и Ирака.
      to: /docs/common/turkic-peoples
      img: /wars/Ottoman-Safavid Wars.png
    - title: Основание империи Великих Моголов (1526)
      description: Войска Бабура (тимуридский принц тюрко-монгольского происхождения) против Делийского султаната. Используя osmanскую пороховую тактику, Бабур разгромил значительно большую индийскую армию. Эта победа заложила основу империи Моголов в Индии, ставшей одной из величайших мировых держав и оставившей неизгладимый культурный след на субконтиненте.
      to: /docs/common/turkic-peoples
      img: /wars/Mughal Empire.png
    - title: Турецкая война за независимость (1919–1923)
      description: Турецкое национальное движение (Анкарское правительство) против союзных держав (Греция, Франция, Армения, Великобритания/Италия) и Osmanского султаната. Под руководством Мустафы Кемаля Ататюрка этот конфликт предотвратил раздел Анатолии союзниками. В итоге был упразднён Османский султанат и основана Турецкая Республика как современное светское национальное государство.
      to: /docs/common/turkic-peoples
      img: /wars/The Turkish War of Independence.png

gallery:
  title: Туркестанская серия
  description: |
    Туркестанская серия картин была создана в ходе двух экспедиций в Среднюю Азию в 1867–1868 и 1869–1870 годах, а также в Париже зимой 1868–1869 годов и в Мюнхене с 1871 по 1873 год.

    Летом 1867 года В. В. Верещагин узнал, что генерал Константин Петрович Кауфман, только что назначенный генерал-губернатором Туркестана, ищет художника в своё окружение. Через знакомых Верещагин договорился о встрече с генерал-губернатором и представил свои кавказские эскизы. Кауфман был заинтригован молодым человеком и зачислил его на службу в чине прапорщика. Примечательно, что Верещагин выговорил право не носить военную форму и получил гарантию, что не будет рассматриваться для дальнейших продвижений по службе.

  features:
    - title: Апофеоз войны, 1872, холст, масло
      description: |
        «Апофеоз» изображает груду человеческих черепов на выжженной земле — последствие битвы или осады. Стая стервятников занята разбором груды; одни птицы уже сели, другие слетаются или сидят на деревьях поблизости. Земля под ними — тусклая, землистая жёлтая, поросшая травой, дополняя грязно-слоновый цвет частично отбелённых черепов. Тень от груды вместе со множеством чёрных проёмов пустых челюстей и глазниц придаёт картине ощущение глубины, ещё больше подчёркивая масштаб смертоносной груды.

        Горный хребет служит разделительной линией, отделяя бескрайность степей от пустоты неба; в правой части картины виден Самарканд. Стены города явно пробиты — отсылка к осаде Самарканда летом 1868 года, когда русский гарнизон отразил атаку бухарцев. На раме картины Верещагин написал, что посвящает её «всем великим завоевателям — прошлым, настоящим и грядущим».
      icon: i-streamline-plump-color:painting-board-flat
      to: /docs/
      img: /turkestan-series/vereshagin-war-apopheos.jpg
    - title: Торжествуют, 1872, холст, масло
      description: qwe
      icon: i-streamline-plump-color:painting-board-flat
      to: /docs/common/turkic-peoples
      img: /turkestan-series/torzhestvo.jpg
    - title: Нападают врасплох, 1871, холст, масло
      description: qwe
      icon: i-streamline-plump-color:painting-board-flat
      to: /docs/common/turkic-peoples
      img: /turkestan-series/Wassilij_Wassiljewitsch_Wereschtschagin_002.jpg
    - title: "Парламентёры. «Сдавайтесь!» — «Убирайтесь к чёрту!», 1873, холст, масло"
      description: qwe
      icon: i-streamline-plump-color:painting-board-flat
      to: /docs/common/turkic-peoples
      img: /turkestan-series/envoys.jpg
    - title: У крепостной стены. Пусть войдут!, 1871, холст, масло
      description: qwe
      icon: i-streamline-plump-color:painting-board-flat
