users:
  title: Что говорят наши пользователи
  features:
    - title: Асилбек Мадиев
      description: Основатель и технический директор
      icon: i-fa-solid:user-tie
      img: /users/founder.jpg
      to: /docs/common/turkic-peoples
      quote: Этот проект начался как личная мечта — объединить тюркский мир. Наблюдать за тем, как он вырастает в совместный, управляемый сообществом центр знаний, невероятно. Каждый вклад, большой или маленький, помогает нам строить долговечное наследие для будущих поколений.
    - title: Для инвесторов
      quote: Диверсифицируйте свой портфель, инвестируя в следующий бестселлер и участвуя в его финансовом успехе.
