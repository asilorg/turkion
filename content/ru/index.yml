title: Цифровая энциклопедия тюркского мира
description: Охватывая обширные просторы от берегов Средиземноморья до глубин Сибири, тюркский мир — это яркое созвездие народов и общин, объединённых общими историческими корнями, языковыми связями и культурным родством. Эта энциклопедия — ваш всесторонний цифровой путеводитель по этому динамичному и многогранному миру.

hero:
  title: Энциклопедия тюркского мира
  description: Охватывая обширные просторы от берегов Средиземноморья до глубин Сибири, тюркский мир — это яркое созвездие народов и общин, объединённых общими историческими корнями, языковыми связями и культурным родством. Эта энциклопедия — ваш всесторонний цифровой путеводитель по этому динамичному и многогранному миру.
  links:
    - label: Начать изучение
      to: /docs/common/turkic-peoples
      class: 'nuxt-only'
    - label: Перейти к хронологии
      to: /timeline
      variant: outline
      color: neutral
      trailingIcon: i-lucide-arrow-right
  features:
    - icon: i-streamline-plump-color:book-1-flat
      title: "Тюркский мир: ваш цифровой портал"
      description: Откройте общие корни, языки и яркую, многообразную культуру.
    - icon: i-streamline-color:islam-flat
      title: "Один язык, много народов: исследуйте тюркский мир"
      description: Путешествие по континентам в созвездие культур, объединённых историей и языком. Это ваш цифровой портал в сердце динамичного тюркского мира.
    - icon: i-streamline-plump-color:world-flat
      title: Откройте новый мир
      description: От сибирских просторов до берегов Средиземноморья — откройте для себя народы и культуры, формирующие тюркский мир. Ваш исчерпывающий путеводитель по богатому и взаимосвязанному наследию.
features:
  - title: Туркменистан
