title: Хронология тюркских народов
description: Между 500 и 1300 годами н.э. тюркские народы расширились из Центральной Азии, создав империи по всей Евразии, начиная с Гёктюркского каганата в 552 году. Ключевые события включали западную миграцию огузских тюрков, захват Багдада сельджуками в 1055 году и их победу при Манцикерте в 1071 году, открывшую Анатолию для постоянного тюркского заселения.

timeline:
  - title: "Хронология тюркских народов (500–1300)"
    date: "Пролог"
    markdown: |
      Хронология тюркских народов с 500 по 1300 год охватывает этногенез и государственное строительство тюркоязычных кочевых скотоводов Центральной Азии — от консолидации перед основанием Гёктюркского каганата в 552 году н.э. как первой засвидетельствованной тюркской империи до расширения огузских государств, таких как Великая Сельджукская держава (1040–1157) и Румский султанат (1080–1308). Возникнув в горах Алтая и степях Монголии, эти группы использовали мастерство верховой езды и составной лук для создания каганатов, простиравшихся от Тихого океана до Чёрного моря.

  - title: "III век до нашей эры"
    date: "III в. до н.э."
    markdown: |
      ## Начало тюркской истории

      ### :sparkles:️ 220 год до н.э.

      Модэ-шаньюй объединил тюркские и монгольские племена под властью хуннов — первого тюркского государства. Сяньну существовало и до Модэ-шаньюя, однако именно он объединил большинство тюркских племён и внёс наибольший вклад по сравнению со своим отцом. В шатре отца он казнил его руками своих самых преданных лучников. Отец Модэ женился на китайской принцессе — стратегический ход Китая для захвата империи. Модэ, осознав ситуацию, приказал казнить отца за «государственную измену» и взял власть в свои руки, создав армию. Дата этого события принята как символическая дата основания турецких Сухопутных войск.

  - title: "IV век"
    date: "IV в."
    markdown: |
      ### :sparkles:️ 395 год

      [Великое переселение народов:](https://en.wikipedia.org/wiki/Migration_Period) IV век ознаменовал начало Великого переселения народов — периода масштабных кочевых движений по всей Евразии, которые в итоге привели к возвышению тюркских империй.

  - title: "V век"
    date: "V в."
    markdown: |
      ### :sparkles:️ 461 год

      Сабирский народ в районе Сибири. Сабиры, считающиеся одной из ранних тюркских групп, были расположены в районе Сибири к 461 году н.э., что свидетельствует о распространении тюркского влияния по всей Евразии.

      ### :sparkles:️ 480 год

      Пра-болгары между Каспийским морем и Дунаем.

  - title: "VI век"
    date: "VI в."
    markdown: |
      ## Средние века / Тюрки

      ### :sparkles:️ 552 год

      Основание Гёктюркского каганата — первой тюркской империи. Бумын-каган объединил тюркские племена и провозгласил себя каганом.

      ### :sparkles:️ 568 год

      Тюркские послы прибывают в Константинополь, устанавливая дипломатические отношения с Византийской империей.
