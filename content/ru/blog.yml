  description: Добро пожаловать в официальный блог Тюркской энциклопедии. Здесь наша редколлегия и приглашённые учёные публикуют глубокие статьи, исследуют исторические нюансы и представляют обновления последних академических исследований по истории, языкам, культурам и народам тюркского мира Евразии.