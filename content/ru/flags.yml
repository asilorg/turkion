title: Флаги
description: От малинового полумесяца со звездой Анатолии до небесно-голубых просторов Средней Азии — флаги тюркских этносов рассказывают историю древних корней, общей истории и многообразных культур. Эта страница — ваш путеводитель по богатой символике этих эмблем. Погрузитесь в значения цветов, смысл узоров и уникальные истории каждого народа и общины тюркского мира.
navigation: false
hero:
  title: Флаги тюркских этносов
  description: Визуальный путеводитель по флагам тюркских этносов. Откройте значение цветов, символов и историю каждого знамени.
